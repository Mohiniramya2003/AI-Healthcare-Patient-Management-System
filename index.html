<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Prediction Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-4">

        <h1 class="main-title">
            🏥 Health Prediction System
        </h1>

        <p class="subtitle">
            AI Powered Patient Health Risk Assessment
        </p>

    </div>

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">
                Patient Registration Form
            </h4>

        </div>

        <div class="card-body">

            <form id="patientForm">

                <input type="hidden" id="patientId">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            id="full_name"
                            class="form-control"
                            placeholder="Enter Patient Name"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Date of Birth
                        </label>

                        <input
                            type="date"
                            id="date_of_birth"
                            class="form-control"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            placeholder="Enter Email"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Glucose Level
                        </label>

                        <input
                            type="number"
                            id="glucose"
                            class="form-control"
                            placeholder="Enter Glucose Value"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Haemoglobin Level
                        </label>

                        <input
                            type="number"
                            id="haemoglobin"
                            class="form-control"
                            placeholder="Enter Haemoglobin Value"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Cholesterol Level
                        </label>

                        <input
                            type="number"
                            id="cholesterol"
                            class="form-control"
                            placeholder="Enter Cholesterol Value"
                            required>
                    </div>

                </div>

                <div class="text-center mt-3">

                    <button type="submit" class="btn btn-primary btn-lg px-5">
                        Save Patient
                    </button>

                </div>

            </form>

        </div>

    </div>

    <div class="card shadow-lg border-0 mt-5">

        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">
                Patient Records
            </h4>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">

                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Glucose</th>
                        <th>Haemoglobin</th>
                        <th>Cholesterol</th>
                        <th>Health Prediction</th>
                        <th>Actions</th>
                    </tr>

                    </thead>

                    <tbody id="patientTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
